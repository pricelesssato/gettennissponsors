<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Admin — GetTennisSponsors</title>
<link rel="icon" type="image/png" href="/assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--green:#0F4D34;--green-2:#15573C;--green-3:#0A3A27;--accent:#C8DC2B;--ink:#16241D;--muted:#6E756F;
  --line:#E4E8E3;--line-2:#D2D8D0;--bg:#F4F6F3;--surface:#FFFFFF;--red:#B23A48;--blue:#2563A8;--amber:#B5790E;
  --radius:12px;--shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:var(--blue);}
.hdr{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:10px 20px;}
.hdr img{height:46px;}
.hdr .sys{font-family:"Roboto Mono";font-size:12px;color:var(--muted);font-weight:700;}
.hdr .who{margin-left:auto;font-size:12.5px;color:var(--muted);}
.wrap{max-width:1120px;margin:0 auto;padding:18px 20px 70px;}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;align-items:center;}
.tabs button.tab{padding:11px 16px;font-size:14px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
.tabs button.tab.on{color:var(--green);border-bottom-color:var(--green);}
.h1{font-size:20px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.h1 .sub{font-size:12.5px;font-weight:400;color:var(--muted);}
.tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.tools input,.tools select{border:1px solid var(--line-2);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13.5px;background:#fff;}
.tools input.q{flex:1;min-width:200px;}
.btn{background:var(--green);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:9px;}
.btn.ghost{background:#fff;color:var(--green);border:1px solid var(--line-2);}
.btn.red{background:var(--red);color:#fff;}
.btn.sm{padding:6px 10px;font-size:12px;}
.row{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:11px 12px;margin-bottom:8px;}
.row .th{width:96px;height:62px;border-radius:8px;object-fit:cover;flex:0 0 auto;background:var(--bg);border:1px solid var(--line-2);}
.row .meta{flex:1;min-width:0;}
.row .tt{font-weight:700;font-size:14px;line-height:1.35;}
.row .mm{font-size:11.5px;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.row .acts{display:flex;gap:6px;flex:0 0 auto;}
.badge{font-family:"Roboto Mono";font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:5px;white-space:nowrap;}
.b-published,.b-live,.b-contracted{color:var(--green);background:#e6f0ea;}
.b-hidden,.b-lost{color:var(--red);background:#f7e9eb;}
.b-draft,.b-prospect{color:var(--muted);background:#eef0ed;}
.b-scheduled,.b-approach,.b-renewal,.b-operator{color:var(--blue);background:#e6eef7;}
.b-negotiating{color:var(--amber);background:#f6efdd;}
.b-self,.b-form,.b-inbound{color:var(--green);background:#e6f0ea;}
.b-agent{color:var(--blue);background:#e6eef7;} .b-direct{color:var(--muted);background:#eef0ed;}
.b-need{color:#5b3aa6;background:#ede8fa;}
.pager{display:flex;justify-content:center;gap:14px;align-items:center;margin-top:16px;}
.pager .pinfo{font-family:"Roboto Mono";font-size:12px;color:var(--muted);}
.note{color:var(--muted);font-size:13px;padding:30px;text-align:center;}
/* pipeline board */
.board{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(168px,1fr);gap:10px;overflow-x:auto;padding-bottom:8px;}
.col{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;min-width:168px;}
.col .ch{font-family:"Roboto Mono";font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:flex;justify-content:space-between;padding:2px 4px 8px;}
.card{background:var(--bg);border:1px solid var(--line-2);border-radius:8px;padding:9px;margin-bottom:7px;cursor:pointer;transition:.12s;}
.card:hover{border-color:var(--green);}
.card .cn{font-weight:700;font-size:12.5px;line-height:1.3;}
.card .cs{font-size:11px;color:var(--muted);margin-top:3px;}
.card .cmt{font-size:11px;color:var(--green);font-weight:700;margin-top:4px;font-family:"Roboto Mono";}
.card .due{font-size:10.5px;color:var(--red);margin-top:3px;}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(20,30,25,.4);z-index:80;opacity:0;pointer-events:none;transition:.2s;}
.scrim.on{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(580px,96vw);background:#fff;z-index:90;transform:translateX(102%);transition:.24s;overflow-y:auto;box-shadow:-8px 0 30px rgba(20,40,30,.16);}
.drawer.on{transform:none;}
.dh{position:sticky;top:0;background:#fff;padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;z-index:2;}
.dh h3{font-size:16px;font-weight:900;}
.db{padding:18px 20px 60px;}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:18px 0 8px;border-top:1px solid var(--line);padding-top:14px;}
.sec:first-child{border-top:none;padding-top:0;margin-top:0;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line-2);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13.5px;background:var(--bg);}
.field textarea{min-height:90px;resize:vertical;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.econ{background:var(--bg);border:1px solid var(--line-2);border-radius:9px;padding:10px 12px;font-size:12.5px;}
.econ div{display:flex;justify-content:space-between;padding:2px 0;}
.econ b{font-family:"Roboto Mono";}
.imgbox{border:1px solid var(--line-2);border-radius:10px;padding:12px;background:var(--bg);}
.imgbox img{width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:none;}
.imgbtns{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 6px;}
.filebtn{font-size:12.5px;font-weight:700;color:var(--green);border:1px solid var(--line-2);border-radius:9px;padding:8px 12px;cursor:pointer;background:#fff;}
.stockgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:8px;max-height:240px;overflow:auto;}
.stockgrid img{width:100%;height:74px;object-fit:cover;border-radius:7px;cursor:pointer;border:2px solid transparent;}
.stockgrid img:hover{border-color:var(--green);}
.pbtn{background:var(--green);color:#fff;font-weight:700;font-size:14px;padding:12px;border-radius:10px;width:100%;}
.actlog{margin-top:6px;}
.actitem{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12.5px;}
.actitem .am{font-size:10.5px;color:var(--muted);display:flex;gap:8px;margin-bottom:2px;align-items:center;}
.minirow{display:flex;gap:8px;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;}
.minirow .mn{font-size:12.5px;font-weight:700;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);z-index:130;background:var(--ink);color:#fff;font-size:13px;padding:12px 20px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;}
.toast.on{opacity:1;transform:translateX(-50%);}
.toast.err{background:var(--red);}
.gate{max-width:440px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:26px;}
.gate h2{font-size:18px;font-weight:900;margin-bottom:6px;}
.gate p{font-size:13px;color:var(--muted);margin-bottom:14px;}
</style>
</head>
<body>
<div class="hdr">
  <a href="./index.html"><img src="./assets/logo.png" alt="GetTennisSponsors"></a>
  <span class="sys">SPONSOR OS</span>
  <span class="who" id="who"></span>
</div>
<div class="wrap" id="app"><div class="note">Loading…</div></div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div class="dh"><h3 id="d-title">Edit</h3><button class="btn ghost sm" onclick="closeDrawer()">Close</button></div><div class="db" id="d-body"></div></aside>
<div class="toast" id="toast"></div>

<script src="./shared/config.js"></script>
<script type="module">
import { supabase, requireConfig, countryName, countryOptions, money } from "./shared/supabase.js";
const PEXELS=(window.GTS_CONFIG||{}).PEXELS_API_KEY||'';
const TZ=Intl.DateTimeFormat().resolvedOptions().timeZone||'local';
const PER=25;
const NEED=[['A','A · Sales / leads'],['B','B · Brand / trust'],['C','C · People / recruiting'],['D','D · Milestone']];
const SOURCE=['form','agent','direct','inbound'];
const STAGES=['prospect','approach','negotiating','contracted','live','renewal','lost'];
const STAGE_LABEL={prospect:'Prospect',approach:'Approach',negotiating:'Negotiating',contracted:'Contracted',live:'Live',renewal:'Renewal',lost:'Lost'};
const ACT=['memo','mail','call','visit','form'];
let SESSION=null, IS_ADMIN=false, TAB='companies';
let N_PAGE=0, N_Q='', N_STATUS='all', N_EDIT=null, IMG=null;       // news
let C_Q='', C_NEED='all', C_SRC='all', C_EDIT=null;                 // companies
let D_STAGE='all', D_EDIT=null;                                     // deals
let LIST_COMPANIES=[], LIST_SPONSORABLES=[];                        // caches for selects
let toTimer;
function toast(m,err){const t=document.getElementById('toast');t.textContent=m;t.className='toast on'+(err?' err':'');clearTimeout(toTimer);toTimer=setTimeout(()=>t.className='toast',2600);}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fdt(d){try{return new Date(d).toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'});}catch(e){return '';}}
function fd(d){try{return new Date(d).toLocaleDateString(undefined,{dateStyle:'medium'});}catch(e){return '';}}
function opts(arr,sel){return arr.map(v=>{const[val,lab]=Array.isArray(v)?v:[v,v];return `<option value="${esc(val)}"${val===sel?' selected':''}>${esc(lab)}</option>`;}).join('');}
const content=()=>document.getElementById('content');

/* ===================== AUTH ===================== */
let STARTED=false;
async function proceed(){
  if(STARTED)return; STARTED=true;
  document.getElementById('who').textContent=SESSION.user.email;
  const {data:prof}=await supabase.from('profiles').select('role').eq('id',SESSION.user.id).maybeSingle();
  IS_ADMIN = prof && (prof.role==='admin'||prof.role==='staff');
  if(!IS_ADMIN){ document.getElementById('app').innerHTML='<div class="gate"><h2>Not authorized</h2><p>This account is not an admin. <button class="btn ghost sm" id="so">Sign out</button></p></div>'; document.getElementById('so').onclick=signOut; return; }
  renderShell(); switchTab(TAB);
}
async function init(){
  if(!requireConfig())return;
  supabase.auth.onAuthStateChange((event,s)=>{
    if((event==='SIGNED_IN'||event==='INITIAL_SESSION') && s && !STARTED){ SESSION=s; proceed(); }
    else if(event==='SIGNED_OUT'){ STARTED=false; SESSION=null; document.getElementById('who').textContent=''; renderGate(); }
  });
  const {data:{session}}=await supabase.auth.getSession();
  if(session){ SESSION=session; proceed(); } else { renderGate(); }
}
function renderGate(){
  document.getElementById('app').innerHTML=`<div class="gate">
    <h2>Admin sign in</h2><p>Sign in with your admin email (one-time link, no password).</p>
    <div class="field"><label>Email</label><input id="g-email" type="email" placeholder="yasuhito.sato@gmail.com"></div>
    <button class="pbtn" id="g-btn">Send login link</button></div>`;
  document.getElementById('g-btn').onclick=async()=>{
    const email=document.getElementById('g-email').value.trim(); if(!email){toast('Enter email',true);return;}
    const {error}=await supabase.auth.signInWithOtp({email,options:{emailRedirectTo:location.href}});
    if(error){toast(error.message,true);return;} toast('Login link sent — check your email');
  };
}
async function signOut(){await supabase.auth.signOut();}

/* ===================== SHELL / TABS ===================== */
function renderShell(){
  document.getElementById('app').innerHTML=`
    <div class="tabs">
      <button class="tab" data-tab="companies">Prospects</button>
      <button class="tab" data-tab="deals">Pipeline</button>
      <button class="tab" data-tab="news">News</button>
      <button class="btn ghost sm" id="t-out" style="margin-left:auto">Sign out</button>
    </div>
    <div id="content"><div class="note">Loading…</div></div>`;
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  document.getElementById('t-out').onclick=signOut;
}
function switchTab(t){
  TAB=t; closeDrawer();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  if(t==='news') renderNews();
  else if(t==='companies') renderCompanies();
  else renderDeals();
}

/* ===================== PROSPECTS (companies) ===================== */
function renderCompanies(){
  content().innerHTML=`
    <div class="h1">Prospect companies <span class="sub">demand side · sponsors to win</span></div>
    <div class="tools">
      <input class="q" id="c-q" placeholder="Search name / industry / notes / referrer…">
      <select id="c-need"><option value="all">All needs</option>${opts(NEED,'')}</select>
      <select id="c-src"><option value="all">All sources</option>${opts(SOURCE,'')}</select>
      <button class="btn" id="c-go">Search</button>
      <button class="btn ghost" id="c-new">+ New company</button>
    </div>
    <div id="c-list"><div class="note">Loading…</div></div>`;
  document.getElementById('c-go').onclick=()=>{C_Q=document.getElementById('c-q').value.trim();C_NEED=document.getElementById('c-need').value;C_SRC=document.getElementById('c-src').value;loadCompanies();};
  document.getElementById('c-q').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('c-go').click();});
  document.getElementById('c-new').onclick=()=>openCompany(null);
  document.getElementById('c-q').value=C_Q;document.getElementById('c-need').value=C_NEED;document.getElementById('c-src').value=C_SRC;
  loadCompanies();
}
async function loadCompanies(){
  const box=document.getElementById('c-list'); box.innerHTML='<div class="note">Loading…</div>';
  let qy=supabase.from('companies').select('*, deals(id,stage,amount,currency)').order('created_at',{ascending:false});
  if(C_NEED!=='all') qy=qy.eq('need_category',C_NEED);
  if(C_SRC!=='all') qy=qy.eq('source',C_SRC);
  if(C_Q){const w=C_Q.replace(/[,()*]/g,' ');qy=qy.or(`name.ilike.*${w}*,industry.ilike.*${w}*,notes.ilike.*${w}*,referrer.ilike.*${w}*`);}
  const {data,error}=await qy;
  if(error){box.innerHTML='<div class="note">Error: '+esc(error.message)+'</div>';return;}
  if(!data.length){box.innerHTML='<div class="note">No companies yet. Click “+ New company”.</div>';return;}
  // primary contacts in one round-trip
  const cids=[...new Set(data.map(c=>c.primary_contact_id).filter(Boolean))];
  let cmap={};
  if(cids.length){const {data:cs}=await supabase.from('contacts').select('id,name,email,phone,title').in('id',cids); (cs||[]).forEach(c=>cmap[c.id]=c);}
  box.innerHTML=data.map(c=>{
    const pc=cmap[c.primary_contact_id];
    const deals=c.deals||[]; const live=deals.filter(d=>d.stage!=='lost');
    const top=live.sort((a,b)=>STAGES.indexOf(b.stage)-STAGES.indexOf(a.stage))[0];
    return `<div class="row">
      <div class="meta">
        <div class="tt">${esc(c.name)}${c.website?` <a href="${esc(c.website)}" target="_blank" rel="noopener" style="font-size:11px">↗</a>`:''}</div>
        <div class="mm">
          ${c.need_category?`<span class="badge b-need" title="need category">${esc(c.need_category)}</span>`:''}
          <span class="badge b-${c.source}">${esc(c.source)}</span>
          ${c.industry?`<span>${esc(c.industry)}</span>`:''}
          ${c.country?`· ${esc(countryName(c.country))}`:''}
          ${pc?`· 👤 ${esc(pc.name||pc.email||'')}`:''}
          ${c.referrer?`· ref: ${esc(c.referrer)}`:''}
          · <b>${deals.length}</b> deal${deals.length===1?'':'s'}${top?` · <span class="badge b-${top.stage}">${esc(top.stage)}</span>`:''}
        </div>
      </div>
      <div class="acts"><button class="btn ghost sm" data-c="${c.id}">Open</button></div>
    </div>`;
  }).join('');
  box.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>openCompany(data.find(x=>x.id===b.dataset.c)));
}

async function openCompany(c){
  C_EDIT=c||null; const isNew=!c;
  let pc=null;
  if(c&&c.primary_contact_id){const {data}=await supabase.from('contacts').select('*').eq('id',c.primary_contact_id).maybeSingle();pc=data;}
  document.getElementById('d-title').textContent=isNew?'New prospect company':'Edit prospect';
  c=c||{};
  document.getElementById('d-body').innerHTML=`
    <div class="sec">Company</div>
    <div class="field"><label>Company name *</label><input id="f-name" value="${esc(c.name||'')}" placeholder="e.g. ASICS Europe"></div>
    <div class="row2">
      <div class="field"><label>Industry</label><input id="f-industry" value="${esc(c.industry||'')}" placeholder="Apparel, Finance…"></div>
      <div class="field"><label>Company size</label><input id="f-size" value="${esc(c.size||'')}" placeholder="e.g. 500+"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Country</label><select id="f-country">${countryOptions(c.country||'')}</select></div>
      <div class="field"><label>Website</label><input id="f-website" value="${esc(c.website||'')}" placeholder="https://…"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Need category</label><select id="f-need"><option value="">—</option>${opts(NEED,c.need_category||'')}</select></div>
      <div class="field"><label>Source</label><select id="f-source">${opts(SOURCE,c.source||'direct')}</select></div>
    </div>
    <div class="field"><label>Referrer (紹介者)</label><input id="f-referrer" value="${esc(c.referrer||'')}" placeholder="Who introduced this prospect"></div>
    <div class="field"><label>Notes</label><textarea id="f-notes">${esc(c.notes||'')}</textarea></div>

    <div class="sec">Primary contact (担当者)</div>
    <div class="row2">
      <div class="field"><label>Name</label><input id="f-cname" value="${esc(pc?.name||'')}"></div>
      <div class="field"><label>Title</label><input id="f-ctitle" value="${esc(pc?.title||'')}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Email</label><input id="f-cemail" value="${esc(pc?.email||'')}"></div>
      <div class="field"><label>Phone</label><input id="f-cphone" value="${esc(pc?.phone||'')}"></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="pbtn" id="f-save">${isNew?'Create company':'Save changes'}</button>
      ${isNew?'':'<button class="btn red" id="f-del" style="flex:0 0 auto;padding:12px 16px">Delete</button>'}
    </div>

    ${isNew?'':`
    <div class="sec">Deals</div>
    <div id="f-deals"><div class="note" style="padding:10px">Loading…</div></div>
    <button class="btn ghost sm" id="f-newdeal" style="margin-top:4px">+ New deal for this company</button>

    <div class="sec">Activity log (やりとり)</div>
    <div class="row2" style="grid-template-columns:120px 1fr">
      <div class="field"><label>Type</label><select id="a-type">${opts(ACT,'memo')}</select></div>
      <div class="field"><label>Date</label><input id="a-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="field"><label>Note</label><textarea id="a-body" style="min-height:60px" placeholder="What happened…"></textarea></div>
    <button class="btn ghost sm" id="a-add">Add to log</button>
    <div class="actlog" id="a-log" style="margin-top:10px"></div>`}`;
  document.getElementById('f-save').onclick=saveCompany;
  if(!isNew){
    document.getElementById('f-del').onclick=delCompany;
    document.getElementById('f-newdeal').onclick=()=>openDeal(null,c.id);
    document.getElementById('a-add').onclick=()=>addActivity({company_id:c.id});
    loadCompanyDeals(c.id); loadActivities({company_id:c.id});
  }
  openDrawer();
}
async function loadCompanyDeals(cid){
  const box=document.getElementById('f-deals'); if(!box)return;
  const {data}=await supabase.from('deals').select('*, sponsorables(name)').eq('company_id',cid).order('updated_at',{ascending:false});
  if(!data||!data.length){box.innerHTML='<div class="note" style="padding:8px">No deals yet.</div>';return;}
  box.innerHTML=data.map(d=>`<div class="minirow"><div><div class="mn">${esc(d.sponsorables?.name||'—')}</div><div style="font-size:11px;color:var(--muted)">${d.amount?esc(money(d.currency,d.amount)):'no amount'}</div></div>

    email:document.getElementById('f-cemail').value.trim()||null,

      if(C_EDIT.primary_contact_id){

        const {data:ct,error:e2}=await supabase.from('contacts').insert({...contact,belongs_to:'company',parent_id:C_EDIT.id}).select('id').single(); if(e2)throw e2;
        await supabase.from('companies').update({primary_contact_id:ct.id}).eq('id',C_EDIT.id);
      }
    }else{
      const {data:co,error}=await supabase.from('companies').insert({...payload,owner_id:SESSION.user.id}).select('id').single(); if(error)throw error;
      companyId=co.id;
      if(hasContact){

        await supabase.from('companies').update({primary_contact_id:ct.id}).eq('id',companyId);

async function loadNews(){
  const list=document.getElementById('list'); list.innerHTML='<div class="note">Loading…</div>';

  qy=qy.range(N_PAGE*PER, N_PAGE*PER+PER-1);
  const {data,error,count}=await qy;
  if(error){list.innerHTML='<div class="note">Error: '+esc(error.message)+'</div>';return;}
  if(!data.length){list.innerHTML='<div class="note">No posts found.</div>';renderPager(0);return;}
  list.innerHTML=data.map(n=>`
    <div class="row">
      <img class="th" src="${esc(n.image_url||'./assets/icon.png')}" alt="">
      <div class="meta">

          ${n.country?`· ${esc(n.country)}`:''} · ${fdt(n.published_at||n.created_at)}
        </div>

        ${n.status==='published'?`<button class="btn ghost sm" data-hide="${n.id}">Hide</button>`:`<button class="btn sm" data-pub="${n.id}">Publish</button>`}
      </div>
    </div>`).join('');
  list.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openNews(data.find(x=>x.id===b.dataset.edit)));
  list.querySelectorAll('[data-hide]').forEach(b=>b.onclick=()=>quickStatus(b.dataset.hide,'hidden'));
  list.querySelectorAll('[data-pub]').forEach(b=>b.onclick=()=>quickStatus(b.dataset.pub,'published'));
  renderPager(count||0);

function renderPager(count){
  const pages=Math.max(1,Math.ceil(count/PER));
  document.getElementById('pager').innerHTML=`<button class="btn ghost sm" id="pp" ${N_PAGE===0?'disabled':''}>← Prev</button>
    <span class="pinfo">Page ${N_PAGE+1} / ${pages} · ${count} posts</span>
    <button class="btn ghost sm" id="pn" ${N_PAGE>=pages-1?'disabled':''}>Next →</button>`;

  if(patch.status==='scheduled'){const v=document.getElementById('e-when').value; if(v) patch.published_at=new Date(v).toISOString();}
  if(patch.status==='published' && (N_EDIT.status!=='published')) patch.published_at=new Date().toISOString();
  const btn=document.getElementById('e-save');btn.disabled=true;btn.textContent='Saving…';
  const {error}=await supabase.from('news_posts').update(patch).eq('id',N_EDIT.id);
  btn.disabled=false;btn.textContent='Save changes';
  if(error){toast(error.message,true);return;}
  toast('Saved'); closeDrawer(); loadNews();
}
async function delNews(){
  if(!confirm('Delete this post permanently?'))return;
  const {error}=await supabase.from('news_posts').delete().eq('id',N_EDIT.id);
  if(error){toast(error.message,true);return;}
  toast('Deleted'); closeDrawer(); loadNews();
}

/* ===================== drawer open/close ===================== */
function openDrawer(){document.getElementById('drawer').classList.add('on');document.getElementById('scrim').classList.add('on');}
function closeDrawer(){document.getElementById('drawer').classList.remove('on');document.getElementById('scrim').classList.remove('on');N_EDIT=C_EDIT=D_EDIT=null;}
window.closeDrawer=closeDrawer;
init();
</script>
