<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News — GetTennisSponsors</title>
<meta name="description" content="Tennis sponsorship news on GetTennisSponsors, operated by Tennis Collective.">
<!-- OG/Twitter defaults; per-article values are injected by JS below.
     (For true crawler-visible per-article OG cards, add static generation later.) -->
<meta property="og:site_name" content="GetTennisSponsors">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="/assets/icon.png">
<link rel="apple-touch-icon" href="/assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--green:#0F4D34;--green-2:#15573C;--green-3:#0A3A27;--accent:#C8DC2B;--ink:#16241D;--muted:#6E756F;
  --line:#E4E8E3;--line-2:#D2D8D0;--bg:#F4F6F3;--surface:#FFFFFF;--red:#B23A48;--blue:#2563A8;
  --radius:14px;--shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:var(--blue);text-decoration:none;}
.flag{font-family:"Roboto Mono";font-size:10px;font-weight:700;color:#2c3a31;background:var(--bg);border:1px solid var(--line-2);border-radius:6px;padding:1px 6px;}
.hdr{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.hdr .top{display:flex;align-items:center;gap:24px;padding:14px 24px;max-width:1180px;margin:0 auto;}
.logo{display:flex;align-items:center;flex:0 0 auto;}
.logo img{height:100px;width:auto;display:block;}
.search{flex:1 1 auto;max-width:400px;position:relative;}
.search input{width:100%;border:1px solid var(--line-2);border-radius:999px;padding:9px 14px 9px 36px;font-family:inherit;font-size:13.5px;background:var(--bg);}
.search::before{content:"⌕";position:absolute;left:13px;top:7px;font-size:16px;color:var(--muted);}
.act{display:flex;align-items:center;gap:14px;margin-left:auto;flex:0 0 auto;}
.act a{font-size:13px;font-weight:700;color:#2c3a31;}
.act a:hover{color:var(--green);}
.act .login{border:1px solid var(--line-2);padding:8px 13px;border-radius:9px;color:var(--green);}
.act .post{background:var(--green);color:#fff;padding:9px 15px;border-radius:9px;}
@media(max-width:780px){.act a:not(.post){display:none;}.search{max-width:none;}.logo img{height:64px;}}
.catbar{border-top:1px solid var(--line);background:var(--surface);}
.catbar .inner{display:flex;gap:4px;padding:0 24px;max-width:1180px;margin:0 auto;overflow-x:auto;}
.catbar a{font-size:13px;font-weight:700;color:var(--muted);padding:11px 13px;text-decoration:none;white-space:nowrap;}
.catbar a:hover{color:var(--green);}
.strip{background:linear-gradient(135deg,var(--green-3),var(--green) 60%,var(--green-2));color:#fff;}
.strip .inner{max-width:1180px;margin:0 auto;padding:22px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.strip .t{font-size:20px;font-weight:900;letter-spacing:-.01em;}
.strip .s{font-size:13px;opacity:.9;margin-top:3px;}
.strip .chips{display:flex;gap:8px;flex-wrap:wrap;}
.strip .chip{font-size:11.5px;font-weight:600;color:#eaf2ed;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:6px 11px;}
.wrap{max-width:760px;margin:0 auto;padding:30px 22px 70px;}
.back{font-size:13px;font-weight:700;color:var(--green);display:inline-block;margin-bottom:18px;}
.badge{font-family:"Roboto Mono";font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:6px;}
.badge.self{color:var(--green);background:#e6f0ea;}
.badge.operator{color:var(--blue);background:#e6eef7;}
.amETA{}
.metarow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-bottom:14px;}
.metarow strong{color:#2c3a31;}
.arthero{width:100%;height:280px;border-radius:14px;overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow);}
.arthero img,.arthero svg{width:100%;height:100%;object-fit:cover;display:block;}
h1.title{font-size:30px;font-weight:900;line-height:1.2;letter-spacing:-.01em;margin-bottom:16px;}
.authorline{display:flex;align-items:center;gap:10px;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:22px;}
.authorline .av{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;overflow:hidden;flex:0 0 auto;}
.authorline .av.icon{background:#fff;border:1px solid var(--line);}
.authorline .av.icon img{width:100%;height:100%;object-fit:contain;}
.authorline .nm{font-weight:800;font-size:14px;}
.authorline .ro{font-size:12px;color:var(--muted);}
.sptag{font-family:"Roboto Mono";font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--green);background:#e6f0ea;border:1px solid #cfe3d6;border-radius:5px;padding:1px 6px;vertical-align:middle;}
mark.brand{background:linear-gradient(transparent 52%, rgba(200,220,43,.8) 52%);color:inherit;font-weight:800;padding:0 1px;border-radius:2px;}
.body{font-size:16px;line-height:1.85;color:#1f2c25;}
.body p{margin-bottom:16px;}
.srcbox{margin-top:22px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:13px;}
.srcbox a{font-weight:700;}
.share{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;}
.share button{font-size:13px;font-weight:700;padding:9px 14px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface);color:#2c3a31;}
.share button:hover{border-color:var(--green);color:var(--green);}
.more{margin-top:44px;}
.more h3{font-size:13px;font-family:"Roboto Mono";letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.morecard{display:block;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;color:inherit;box-shadow:var(--shadow);}
.morecard:hover{border-color:var(--green);}
.morecard .mm{font-size:11.5px;color:var(--muted);margin-bottom:5px;}
.morecard .mt{font-weight:800;font-size:14px;line-height:1.4;}
.state{color:var(--muted);font-size:14px;padding:40px 0;text-align:center;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);z-index:120;background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:12px 20px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;}
.toast.on{opacity:1;transform:translateX(-50%);}
</style>
</head>
<body>
<header class="hdr"><div class="top">
  <a class="logo" href="./index.html"><img src="./assets/logo.png" alt="GetTennisSponsors"></a>
  <form class="search" onsubmit="return gtsSearch(event)"><input type="search" placeholder="Search sponsorship news, players, brands…"></form>
  <div class="act">
    <a href="./index.html#organisers">For organisers</a>
    <a href="./index.html#apply">Get sponsors</a>
    <a class="login" href="./news.html">Log in / Sign up</a>
    <a class="post" href="./news.html">＋ Post your news</a>
  </div>
</div>
  <div class="catbar"><div class="inner">
    <a href="./index.html">All</a>
    <a href="./index.html?cat=tournament">Tournaments</a>
    <a href="./index.html?cat=club">Clubs</a>
    <a href="./index.html?cat=player">Players</a>
    <a href="./index.html?cat=other">Other</a>
  </div></div>
</header>
<div class="strip"><div class="inner">
  <div><div class="t">Where tennis gets sponsored.</div><div class="s">The tennis sponsorship press-release platform — operated by Tennis Collective.</div></div>
  <div class="chips"><span class="chip">Global · English</span><span class="chip">Outreach handled for you</span><span class="chip">Measured results</span></div>
</div></div>

<div class="wrap">
  <a class="back" href="./news.html">← All news</a>
  <article id="article"><div class="state">Loading…</div></article>
  <div class="more" id="more"></div>
</div>
<div class="toast" id="toast"></div>

<script src="./shared/config.js"></script>
<script type="module">
import { supabase, requireConfig, countryName, newsThumb, markBrand } from "./shared/supabase.js";
const TYPELABEL={player:"Player",club:"Club",tournament:"Tournament",operator:"GetTennisSponsors (editorial)",other:"Member"};
let toTimer;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast on';clearTimeout(toTimer);toTimer=setTimeout(()=>t.className='toast',2000);}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDate(d){try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch(e){return '';}}
function qparams(){const p=new URLSearchParams(location.search);return {id:p.get('id'),slug:p.get('n')};}
window.gtsSearch=(e)=>{e.preventDefault();const v=e.target.querySelector('input').value.trim();location.href='./index.html'+(v?('?q='+encodeURIComponent(v)):'');return false;};

function setMeta(n,shareUrl){
  const desc=(n.body||n.title||'').slice(0,160);
  document.title = n.title + " — GetTennisSponsors";
  const upsert=(attr,key,content)=>{
    let el=document.head.querySelector(`meta[${attr}="${key}"]`);
    if(!el){el=document.createElement('meta');el.setAttribute(attr,key);document.head.appendChild(el);}
    el.setAttribute('content',content);
  };
  upsert('name','description',desc);
  upsert('property','og:title',n.title);
  upsert('property','og:description',desc);
  upsert('property','og:url',shareUrl);
  upsert('name','twitter:title',n.title);
  upsert('name','twitter:description',desc);
  let can=document.head.querySelector('link[rel="canonical"]');
  if(!can){can=document.createElement('link');can.setAttribute('rel','canonical');document.head.appendChild(can);}
  can.setAttribute('href',shareUrl);
  // JSON-LD NewsArticle
  const ld={"@context":"https://schema.org","@type":"NewsArticle","headline":n.title,
    "datePublished":n.published_at,"inLanguage":"en",
    "author":{"@type":"Organization","name":n.author_name},
    "publisher":{"@type":"Organization","name":"GetTennisSponsors","brand":"Tennis Collective"},
    "mainEntityOfPage":shareUrl};
  if(n.body) ld.description=desc;
  const s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify(ld);document.head.appendChild(s);
}

async function render(){
  if(!requireConfig())return;
  const {id,slug}=qparams();
  const art=document.getElementById('article');
  if(!id&&!slug){art.innerHTML='<div class="state">No article specified. <a href="./news.html">Browse all news →</a></div>';return;}
  let qy=supabase.from('public_news').select('*');
  qy = slug ? qy.eq('slug',slug) : qy.eq('id',id);
  const {data:n,error}=await qy.maybeSingle();
  if(error||!n){art.innerHTML='<div class="state">This article isn\'t available. <a href="./news.html">Browse all news →</a></div>';return;}
  const shareUrl = n.slug ? (location.origin+'/article?n='+n.slug) : location.href;
  setMeta(n,shareUrl);
  const isOp=n.source==='operator';
  const initial=(n.author_name||'?').trim().charAt(0).toUpperCase();
  art.innerHTML=`
    <div class="arthero">${n.image_url?`<img src="${esc(n.image_url)}" alt="">`:newsThumb(n)}</div>
    <div class="metarow">
      <span class="badge ${isOp?'operator':'self'}">${isOp?'⭐ Curated':'🎾 News'}</span>
      ${n.sponsor_name?`<span class="sptag">Sponsor</span> <strong style="color:#2c3a31">${esc(n.sponsor_name)}</strong>`:''}
      ${n.country?`· <span class="flag">${esc(n.country)}</span> ${esc(countryName(n.country))}`:''}
      <span>· ${fmtDate(n.published_at)}</span>
    </div>
    <h1 class="title">${markBrand(n.title, n.sponsor_name||'')}</h1>
    <div class="authorline">
      <div class="av${isOp?' icon':''}">${isOp?'<img src="./assets/icon.png" alt="GetTennisSponsors">':esc(initial)}</div>
      <div><div class="nm">${esc(n.author_name)}</div><div class="ro">${isOp?'Curated by GetTennisSponsors':(TYPELABEL[n.author_type]||'Member')+' · posted this news'}</div></div>
    </div>
    <div class="body">${(n.body||'').split(/\n+/).filter(Boolean).map(p=>`<p>${markBrand(p, n.sponsor_name||'')}</p>`).join('')||'<p class="state">No details provided.</p>'}</div>
    ${n.link_url?`<div class="srcbox">Source: <a href="${esc(n.link_url)}" target="_blank" rel="noopener">${esc(n.link_url)}</a></div>`:''}
    <div class="share">
      <button id="sh-x">Share on X</button>
      <button id="sh-li">LinkedIn</button>
      <button id="sh-cp">Copy link</button>
    </div>`;
  const url=encodeURIComponent(shareUrl), text=encodeURIComponent(n.title);
  document.getElementById('sh-x').onclick=()=>window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`,'_blank');
  document.getElementById('sh-li').onclick=()=>window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`,'_blank');
  document.getElementById('sh-cp').onclick=async()=>{try{await navigator.clipboard.writeText(shareUrl);toast('Link copied');}catch(e){toast('Copy failed');}};
  loadMore(n.id);
}

async function loadMore(excludeId){
  const {data}=await supabase.from('public_news').select('*').order('published_at',{ascending:false}).limit(5);
  const list=(data||[]).filter(x=>x.id!==excludeId).slice(0,4);
  if(!list.length)return;
  document.getElementById('more').innerHTML='<h3>More news</h3>'+list.map(n=>`
    <a class="morecard" href="${n.slug?('./article?n='+n.slug):('./article?id='+n.id)}">
      <div class="mm"><span class="badge ${n.source==='operator'?'operator':'self'}">${n.source==='operator'?'Curated':'News'}</span> &nbsp;${esc(n.author_name)}</div>
      <div class="mt">${esc(n.title)}</div>
    </a>`).join('');
}
render();
</script>
</body>
</html>
